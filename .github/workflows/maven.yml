name: Jakarta IStack Commons

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test on JDK ${{ matrix.java_version }} 
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java_version: [ 17 , 21, 25]

    steps:
    - name: Checkout for build
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 0
    - name: Set up JDK
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        distribution: 'zulu'
        java-version: ${{ matrix.java_version }}
        cache: maven
    - name: Verify
      run: |
        cd istack-commons
        mvn -B -V -U -C -Pstaging,oss-release,license-check clean install org.glassfish.copyright:glassfish-copyright-maven-plugin:check -Dgpg.skip=true -Dittest=true -Dcopyright.ignoreyear=true
#    - name: Upload license-check info
#      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
#      with:
#        name: license-summary.txt
#        path: istack-commons/target/dash/summary
